name: Test

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint, typecheck, unit, integration, e2e, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      OPENROUTER_API_KEY: ci-openrouter-key
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Dead code check (files + dependencies)
        run: npm run knip

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test all
        run: npm run test:all

      - name: Build
        run: npm run build

  db-backed-integration:
    name: DB-backed integration regressions
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.65.5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run DB-backed integration regressions
        run: bash scripts/ci/run-db-backed-integration.sh

      - name: Upload Search/RAG recall artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-rag-recall
          path: test-results/search-rag-recall
          if-no-files-found: ignore

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
